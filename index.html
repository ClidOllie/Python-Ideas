<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chat 🌐</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
  :root {
    --bg:#0f0e17; --surface:#1a1a2e; --surface2:#16213e;
    --accent:#ff6b6b; --accent2:#ffd93d; --accent3:#6bcb77; --accent4:#4d96ff;
    --text:#fffffe; --muted:#a7a9be; --border:rgba(255,255,255,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(77,150,255,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,107,107,.1) 0%,transparent 60%);pointer-events:none;z-index:0;}

  .screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);}
  .screen.gone{display:none;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;width:min(400px,92vw);text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.4);position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3),var(--accent4));}
  .card-emoji{font-size:3.2rem;display:block;margin-bottom:.5rem;animation:bounce 2s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .card-title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem;}
  .card-sub{color:var(--muted);font-size:.9rem;margin-bottom:1.75rem;}
  .field{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:12px;padding:.85rem 1rem;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);outline:none;transition:border-color .2s;text-align:center;margin-bottom:.6rem;}
  .field::placeholder{color:var(--muted);font-weight:600;}
  .field:focus{border-color:var(--accent4);}
  .field.shake{animation:shake .3s ease;border-color:var(--accent)!important;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .err{font-size:.8rem;color:var(--accent);font-weight:700;min-height:1.1rem;margin-bottom:.5rem;}
  .btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--accent4),#7b4fff);border:none;border-radius:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(77,150,255,.3);}
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(0);}
  .card-hint{margin-top:1rem;font-size:.78rem;color:var(--muted);}
  .card-hint code{font-family:'Space Mono',monospace;background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;font-size:.72rem;color:var(--accent3);}

  #chat{display:none;flex-direction:column;height:100dvh;position:relative;z-index:1;}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;background:rgba(26,26,46,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;}
  .hdr-left{display:flex;align-items:center;gap:10px;}
  .hdr-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent4),#7b4fff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
  .hdr-title{font-size:1.05rem;font-weight:900;}
  .hdr-sub{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:1px;}
  .pill{display:flex;align-items:center;gap:6px;background:rgba(107,203,119,.12);border:1px solid rgba(107,203,119,.25);border-radius:20px;padding:4px 10px;font-size:.75rem;font-weight:700;color:var(--accent3);cursor:pointer;}
  .pill:hover{background:rgba(107,203,119,.2);}
  .dot{width:7px;height:7px;background:var(--accent3);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
  .who-panel{background:rgba(26,26,46,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;display:none;flex-wrap:wrap;gap:6px;flex-shrink:0;}
  .who-panel.open{display:flex;}
  .who-tag{background:rgba(107,203,119,.1);border:1px solid rgba(107,203,119,.2);border-radius:20px;padding:3px 10px;font-size:.78rem;font-weight:700;color:var(--accent3);}
  .who-tag.me{background:rgba(255,211,61,.1);border-color:rgba(255,211,61,.3);color:var(--accent2);}
  .conn-bar{text-align:center;font-size:.72rem;font-weight:700;padding:5px;font-family:'Space Mono',monospace;display:none;flex-shrink:0;}
  .conn-bar.err{display:block;background:rgba(255,107,107,.15);color:var(--accent);}
  .conn-bar.ok{display:block;background:rgba(107,203,119,.12);color:var(--accent3);}
  .msgs{flex:1;overflow-y:auto;padding:1rem 1rem .5rem;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;}
  .msgs::-webkit-scrollbar{width:4px;}
  .msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .msg{display:flex;flex-direction:column;max-width:min(75%,480px);animation:msgIn .2s ease;}
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.me{align-self:flex-end;align-items:flex-end;}
  .msg.them{align-self:flex-start;align-items:flex-start;}
  .msg-meta{font-size:.68rem;color:var(--muted);font-weight:700;margin-bottom:3px;padding:0 4px;display:flex;gap:6px;align-items:center;}
  .msg.me .uname{color:var(--accent2);}
  .msg.them .uname{color:var(--accent4);}
  .bubble{padding:.55rem .9rem;border-radius:16px;font-size:.92rem;font-weight:600;line-height:1.5;word-break:break-word;}
  .msg.me .bubble{background:linear-gradient(135deg,var(--accent4),#7b4fff);border-bottom-right-radius:4px;color:#fff;box-shadow:0 2px 12px rgba(77,150,255,.25);}
  .msg.them .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .sys{align-self:center;font-size:.72rem;color:var(--muted);font-weight:700;background:rgba(255,255,255,.04);border-radius:20px;padding:3px 12px;margin:4px 0;font-family:'Space Mono',monospace;}
  .footer{padding:.75rem 1rem;background:rgba(26,26,46,.85);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .inp{flex:1;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:12px;padding:.7rem 1rem;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;color:var(--text);outline:none;transition:border-color .2s;resize:none;max-height:100px;line-height:1.4;}
  .inp::placeholder{color:var(--muted);}
  .inp:focus{border-color:var(--accent4);}
  .send{width:42px;height:42px;flex-shrink:0;background:linear-gradient(135deg,var(--accent4),#7b4fff);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;font-size:1.1rem;color:#fff;box-shadow:0 2px 12px rgba(77,150,255,.3);}
  .send:hover{transform:scale(1.08);}
  .send:active{transform:scale(.95);}
  .scroll-btn{position:absolute;bottom:80px;right:16px;background:var(--accent4);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:none;align-items:center;justify-content:center;color:#fff;font-size:1rem;box-shadow:0 4px 16px rgba(77,150,255,.4);z-index:10;}
  .scroll-btn.show{display:flex;}
</style>
</head>
<body>

<!-- Password -->
<div class="screen" id="s-pass">
  <div class="card">
    <span class="card-emoji">🔒</span>
    <div class="card-title">Private Chat</div>
    <p class="card-sub">Enter the password to get in</p>
    <input class="field" id="pass" type="password" placeholder="password...">
    <div class="err" id="pass-err"></div>
    <button class="btn" id="pass-btn">Unlock →</button>
  </div>
</div>

<!-- Join -->
<div class="screen gone" id="s-join">
  <div class="card">
    <span class="card-emoji">🌐</span>
    <div class="card-title">Global Chat</div>
    <p class="card-sub">Pick a handle and jump in</p>
    <input class="field" id="handle" placeholder="your handle..." maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="err" id="handle-err"></div>
    <button class="btn" id="join-btn">Let's go →</button>
    <p class="card-hint">Python users: run <code>chatworks.py</code> — same room</p>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">🌐</div>
      <div>
        <div class="hdr-title">Global Chat</div>
        <div class="hdr-sub" id="hdr-sub">connecting...</div>
      </div>
    </div>
    <div class="pill" id="pill" onclick="toggleWho()">
      <div class="dot"></div>
      <span id="pill-txt">connecting</span>
    </div>
  </div>
  <div class="who-panel" id="who-panel"></div>
  <div class="conn-bar" id="conn-bar"></div>
  <div class="msgs" id="msgs"></div>
  <button class="scroll-btn" id="scroll-btn" onclick="scrollBot()">↓</button>
  <div class="footer">
    <textarea class="inp" id="inp" placeholder="say something..." rows="1"></textarea>
    <button class="send" id="send-btn">➤</button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const PASSWORD   = 'chat123';
const PK         = '404d8f54ccb40251ca17';   // Pusher key
const CLUSTER    = 'us2';
const CHANNEL    = 'global-chat';
const BIN_ID     = '69f4040aaaba8821975a1456';
const BIN_KEY    = '$2a$10$vKt9uIjp7/5nLq0NPM.oUe6Dtmtqo941CNDojDsijC1DNZ..iBBbG';
const BIN_URL    = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const BIN_HDR    = {'Content-Type':'application/json','X-Master-Key':BIN_KEY};
const SESSION_KEY = 'gchat_ok';
const MAX_HIST   = 200;

let NAME = '', atBot = true, pusher, channel;
const seen = new Set();

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const scrollBot = () => { const e = document.getElementById('msgs'); e.scrollTop = e.scrollHeight; };
const toggleWho = () => document.getElementById('who-panel').classList.toggle('open');
const autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; };
const shake = el => { el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),400); };
const setConn = (msg, type) => { const b=document.getElementById('conn-bar'); b.textContent=msg; b.className='conn-bar '+type; };

// ── JSONBin ───────────────────────────────────────────────────────────────────
async function binGet() {
  const r = await fetch(`${BIN_URL}/latest`, {headers:BIN_HDR});
  if (!r.ok) throw Error(r.status);
  return (await r.json()).record || {};
}
async function binPut(rec) {
  const r = await fetch(BIN_URL, {method:'PUT', headers:BIN_HDR, body:JSON.stringify(rec)});
  if (!r.ok) throw Error(r.status);
}

// ── UI ────────────────────────────────────────────────────────────────────────
const MSG_RE = /^\[(\d{2}:\d{2})\]\s+(.+?):\s+(.+)$/;

function addMessage(raw) {
  if (seen.has(raw)) return;
  seen.add(raw);
  const m = raw.match(MSG_RE);
  let time='', uname='?', text=raw;
  if (m) { time=m[1]; uname=m[2]; text=m[3]; }
  const mine = uname.toLowerCase() === NAME.toLowerCase();
  const el = document.createElement('div');
  el.className = `msg ${mine?'me':'them'}`;
  el.innerHTML = `<div class="msg-meta"><span class="uname">${esc(uname)}</span>${time?`<span>${time}</span>`:''}</div><div class="bubble">${esc(text)}</div>`;
  document.getElementById('msgs').appendChild(el);
  if (atBot) scrollBot();
}

function addSys(txt) {
  const el = document.createElement('div');
  el.className = 'sys';
  el.textContent = txt;
  document.getElementById('msgs').appendChild(el);
  if (atBot) scrollBot();
}

function updateOnline(members) {
  const names = Object.values(members).map(m => m.name || m.id).filter(n => n !== NAME).sort();
  document.getElementById('pill-txt').textContent = `${names.length + 1} online`;
  document.getElementById('hdr-sub').textContent = `${names.length + 1} online · private`;
  document.getElementById('who-panel').innerHTML = [
    `<div class="who-tag me">${esc(NAME)} (you)</div>`,
    ...names.map(n => `<div class="who-tag">${esc(n)}</div>`)
  ].join('');
}

// ── Pusher send (via REST trigger proxy) ──────────────────────────────────────
// The browser can't sign Pusher requests directly (secret must stay server-side).
// Instead we save to JSONBin and Pusher picks it up — OR we use a simple
// Pusher Channels feature: client events on subscribed channels.
// Client events require the channel to be a presence or private channel,
// so we use the public channel + JSONBin write, which the Python watcher polls.
// For the HTML side, Pusher gives us instant receive via WebSocket.

async function sendMessage(text) {
  const ts   = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const line = `[${ts}] ${NAME}: ${text}`;

  // Save to JSONBin — Python script polls this
  try {
    const rec  = await binGet();
    const msgs = rec.messages || [];
    if (!msgs.includes(line)) {
      msgs.push(line);
      rec.messages = msgs.slice(-MAX_HIST);
      await binPut(rec);
    }
  } catch(e) {
    addSys('⚠ send failed');
    return;
  }

  // Show immediately for ourselves
  addMessage(line);
}

// ── Start chat ────────────────────────────────────────────────────────────────
async function startChat() {
  const el = document.getElementById('handle');
  const n  = el.value.trim().slice(0,20);
  if (!n) { document.getElementById('handle-err').textContent='Please enter a handle'; shake(el); el.focus(); return; }
  NAME = n;

  // Pre-load history
  try {
    const rec = await binGet();
    for (const m of (rec.messages||[])) seen.add(m);
  } catch(e) {}

  document.getElementById('s-join').classList.add('gone');
  document.getElementById('chat').style.display = 'flex';

  // Connect to Pusher
  Pusher.logToConsole = false;
  pusher  = new Pusher(PK, { cluster: CLUSTER });
  channel = pusher.subscribe(CHANNEL);

  pusher.connection.bind('connected', () => {
    setConn('⚡ connected — messages are instant', 'ok');
    setTimeout(() => document.getElementById('conn-bar').className='conn-bar', 3000);
  });

  pusher.connection.bind('disconnected', () => setConn('⚠ disconnected — reconnecting...', 'err'));
  pusher.connection.bind('failed',       () => setConn('⚠ connection failed', 'err'));

  // Listen for new messages from Python script or other browser tabs
  channel.bind('message', data => {
    if (data && data.line) addMessage(data.line);
  });

  // Poll JSONBin slowly just to catch Python script messages
  // (Python triggers Pusher AND writes to JSONBin; HTML listens via Pusher)
  setInterval(async () => {
    try {
      const rec = await binGet();
      for (const m of (rec.messages||[])) addMessage(m);
    } catch(e) {}
  }, 8000);

  addSys(`you joined as ${NAME}`);
  document.getElementById('inp').focus();
}

// ── Password ──────────────────────────────────────────────────────────────────
function checkPass() {
  const el = document.getElementById('pass');
  if (el.value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('s-pass').classList.add('gone');
    document.getElementById('s-join').classList.remove('gone');
    document.getElementById('handle').focus();
  } else {
    document.getElementById('pass-err').textContent = 'Wrong password — try again';
    shake(el); el.value=''; el.focus();
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY)==='1') {
    document.getElementById('s-pass').classList.add('gone');
    document.getElementById('s-join').classList.remove('gone');
  }

  document.getElementById('pass-btn').onclick = checkPass;
  document.getElementById('pass').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPass(); });
  document.getElementById('join-btn').onclick = startChat;
  document.getElementById('handle').addEventListener('keydown', e=>{ if(e.key==='Enter') startChat(); });

  document.getElementById('send-btn').onclick = async () => {
    const el = document.getElementById('inp');
    const t  = el.value.trim();
    if (!t) return;
    el.value = ''; autoResize(el);
    await sendMessage(t);
  };

  document.getElementById('inp').addEventListener('keydown', async e => {
    if (e.key==='Enter' && !e.shiftKey) {
      e.preventDefault();
      const el = document.getElementById('inp');
      const t  = el.value.trim();
      if (!t) return;
      el.value = ''; autoResize(el);
      await sendMessage(t);
    }
  });

  document.getElementById('inp').addEventListener('input', function(){ autoResize(this); });

  document.getElementById('msgs').addEventListener('scroll', () => {
    const e = document.getElementById('msgs');
    atBot = e.scrollHeight - e.scrollTop - e.clientHeight < 60;
    document.getElementById('scroll-btn').classList.toggle('show', !atBot);
  });
});
</script>
</body>
</html>
